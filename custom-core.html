<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Core Calculator</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
      <div class="logo-container">
        <a href="https://packx.co.za" target="_blank">
         <img src="pxlogo.png" alt="Site Logo" class="logo">
        </a>
    </div>
  <div class="container">
    <h1>Custom Size Core Calculator</h1>
    <input id="core" type="number" placeholder="Core Diameter (mm)">
    <input id="diameter" type="number" placeholder="Outer Diameter (mm)">
    <input id="thickness" type="number" placeholder="Material Thickness (microns)">

    <div id="resultCustom" class="result-box">Length: – meters</div>

    
    <a href="index.html" class="btn btn-gray">Back</a>
  </div>
  <script src="script.js"></script>
  <script>
    document.getElementById("core").addEventListener("input", calculateCustomCore);
    document.getElementById("diameter").addEventListener("input", calculateCustomCore);
    document.getElementById("thickness").addEventListener("input", calculateCustomCore);
  </script>
</body>
</html>
