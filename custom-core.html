<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Core Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Custom Core Calculator</h1>
    <input id="core" type="number" placeholder="Core Diameter (mm)">
    <input id="diameter" type="number" placeholder="Outer Diameter (mm)">
    <input id="thickness" type="number" placeholder="Material Thickness (microns)">
    <button onclick="calculateCustomCore()">Calculate</button>
    <h2 id="resultCustom"></h2>
  </div>
  <script src="script.js"></script>
</body>
</html>
