<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>6 Inch Core Calculator</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="logo-container">
    <img src="pxlogo.png" alt="Site Logo" class="logo">
  </div>
  <div class="container">
    <h1>6 Inch Core Calculator</h1>
    <input id="diameter" type="number" placeholder="Outer Diameter (mm)">
    <input id="thickness" type="number" placeholder="Material Thickness (microns)">

    <div id="result" class="result-box">Length: – meters</div>

    
    <a href="index.html" class="btn btn-gray">Back</a>
  </div>
  <script src="script.js"></script>
  <script>
    document.getElementById("diameter").addEventListener("input", () => calculate(183));
    document.getElementById("thickness").addEventListener("input", () => calculate(183));
  </script>
</body>
</html>
