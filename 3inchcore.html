<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>8 Inch Core Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">

  <h1 class="text-2xl font-bold mb-6">6 Inch Core Calculator</h1>

  <div class="space-y-4">
    <input id="diameter" type="number" placeholder="Outer Diameter (mm)" class="p-2 border w-full">
    <input id="thickness" type="number" placeholder="Thickness (microns)" class="p-2 border w-full">

    <button onclick="calculate(96)" class="bg-green-600 text-white px-4 py-2 rounded">
      Calculate
    </button>

    <h2 id="result" class="text-xl font-bold"></h2>
  </div>

  <script src="script.js"></script>
</body>
</html>
